name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nf-core/setup-nextflow@v2
        with:
          version: "latest-stable"
      - name: Check Nextflow syntax
        run: nextflow run main.nf --help || true

  stub-run:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: nf-core/setup-nextflow@v2
        with:
          version: "latest-stable"

      - name: Generate synthetic test data
        run: python3 test/generate_test_data.py

      - name: Stub run
        run: |
          nextflow run main.nf \
            -profile test \
            -stub-run \
            --outdir stub_results

      - name: Upload trace
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stub-trace
          path: stub_results/pipeline_info/

  integration:
    runs-on: ubuntu-latest
    needs: stub-run
    steps:
      - uses: actions/checkout@v4

      - uses: nf-core/setup-nextflow@v2
        with:
          version: "latest-stable"

      - name: Generate synthetic test data
        run: python3 test/generate_test_data.py

      - name: Run pipeline with Docker
        run: |
          nextflow run main.nf \
            -profile docker,test \
            --outdir integration_results

      - name: Verify outputs exist
        run: |
          test -d integration_results/fastqc
          test -d integration_results/trimmomatic
          test -d integration_results/bwa_mem
          test -d integration_results/samtools

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: integration_results/
